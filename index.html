<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arif Manga ID</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:#fff;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  border-bottom:3px solid #e74c3c;
}
header span{color:#e74c3c;}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* Grid komik */
.comic-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}

.comic-card{
  background:#222;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.comic-card:hover{transform:scale(1.05);}

.comic-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.comic-title{
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* Modal chapter */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  z-index:100;
}

#chapter-modal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
  z-index:101;
  width:80%;
  max-width:400px;
}

.chapter-item{
  padding:10px;
  border-bottom:1px solid #444;
  cursor:pointer;
}
.chapter-item:hover{background:#e74c3c;}

/* Reader */
#reader{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  z-index:200;
}

#scroll-reader{
  height:100vh;
  overflow-y:auto;
  padding:10px;
}

#readerWrapper img{
  width:100%;
  max-width:800px;
  display:block;
  margin:0 auto 10px;
}

.close-btn{
  position:fixed;
  top:10px;
  right:15px;
  background:#e74c3c;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
  z-index:201;
}
</style>
</head>

<body>

<header>
  <h1>ARIF <span>MANGA ID</span></h1>
</header>

<div class="container">
  <div id="comicGrid" class="comic-grid"></div>
</div>

<div class="overlay" onclick="closeModal()"></div>

<div id="chapter-modal">
  <h3 id="modalTitle"></h3>
  <div id="chapterList"></div>
</div>

<div id="reader">
  <button class="close-btn" onclick="closeReader()">Kembali</button>
  <div id="scroll-reader">
    <div id="readerWrapper"></div>
  </div>
</div>

<script>
// ================= DATA KOMIK =================
const comics = [
{
  id: 1,
  title: "Si Kembar Cinderace",
  cover: "images/si kembar cinderace/cover.png",
  chapters: [
    {
      id: 1,
      title: "Chapter 1",
      pages: Array.from({ length: 38 }, (_, i) =>
        `images/si kembar cinderace/halaman_${i + 1}.png`
      )
    }
  ]
},

{
    id: 2,
  title: "Si Kembar Cinderace 2",
  cover: "images/si kembar cinderace 2/cover.png",
  chapters: [
    {
      id: 2,
      title: "Chapter 1",
      pages: Array.from({ length: 12 }, (_, i) =>
        `images/si kembar cinderace 2/halaman_${i + 1}.png`
      )
    }
  ]
},

{
      id: 3,
  title: "Si Kembar Cinderace 3",
  cover: "images/si kembar cinderace 3/cover_.png",
  chapters: [
    {
      id: 1,
      title: "Chapter 1",
      pages: Array.from({ length: 22 }, (_, i) =>
        `images/si kembar cinderace 3/halaman_${i + 1}.png`
      )
    },
    {id: 2,
      title: "Chapter 2",
      pages: Array.from({ length: 23 }, (_, i) =>
        `images/si kembar cinderace 3/halaman_${i + 23}.png`
      )
    }
  ]
},

];

// ================= FUNGSI =================
function loadComics(){
  const grid = document.getElementById("comicGrid");
  grid.innerHTML = "";
  comics.forEach(c=>{
    grid.innerHTML += `
      <div class="comic-card" onclick="openChapters(${c.id})">
        <img src="${c.cover}">
        <div class="comic-title">${c.title}</div>
      </div>
    `;
  });
}

function openChapters(id){
  const comic = comics.find(c=>c.id===id);
  document.getElementById("modalTitle").innerText = comic.title;
  const list = document.getElementById("chapterList");
  list.innerHTML = "";
  comic.chapters.forEach(ch=>{
    list.innerHTML += `
      <div class="chapter-item" onclick="openReader(${id},${ch.id})">
        ${ch.title}
      </div>
    `;
  });
  document.querySelector(".overlay").style.display="block";
  document.getElementById("chapter-modal").style.display="block";
}

function closeModal(){
  document.querySelector(".overlay").style.display="none";
  document.getElementById("chapter-modal").style.display="none";
}

function openReader(comicId, chapterId){
  closeModal();
  const comic = comics.find(c=>c.id===comicId);
  const chapter = comic.chapters.find(ch=>ch.id===chapterId);
  const wrap = document.getElementById("readerWrapper");
  wrap.innerHTML = "";
  chapter.pages.forEach(p=>{
    const img = document.createElement("img");
    img.src = p;
    wrap.appendChild(img);
  });
  document.getElementById("reader").style.display="block";
}

function closeReader(){
  document.getElementById("reader").style.display="none";
}

loadComics();
</script>

</body>
</html>
